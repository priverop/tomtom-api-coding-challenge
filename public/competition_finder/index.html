    <section class="grid-container">
        <article class="grid-item">
            <h1>Competition Finder</h1>
            <p>Find the information about the competition of your business.</p>
            <form action="/get_competition_info" method="GET" target="apiResponse">
                <div class="form-group">
                    <label for="business_name">Business Name:</label>
                    <input type="text" name="business_name" autocomplete="off" placeholder="Enter business name" required>
                    <div class="example">Example: Starbucks, McDonald's, Subway</div>
                </div>

                <div class="form-group">
                    <label for="latitude">Latitude:</label>
                    <input type="number" step="any" name="latitude" autocomplete="off" placeholder="Enter latitude" required>
                    <div class="example">Example: 51.5</div>
                </div>

                <div class="form-group">
                    <label for="longitude">Longitude:</label>
                    <input type="number" step="any" name="longitude" autocomplete="off" placeholder="Enter longitude" required>
                    <div class="example">Example: -0.13</div>
                </div>

                <button type="submit">Get Competition Info</button>
            </form>
        </article>

        <article class="grid-item api-response">
            <h2>API Response <span class="badge">JSON</span></h2>
